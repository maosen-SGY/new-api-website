<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock 登录页</title>
    <style>
      :root {
        --bg: #f4f8ff;
        --card: #ffffff;
        --line: #d8e6ff;
        --text: #12284f;
        --muted: #5a6f95;
        --primary: #2f6bff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #eaf2ff 0%, #f4f8ff 40%, #f8fbff 100%);
      }
      .card {
        width: min(440px, 92vw);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 22px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }
      .field {
        margin-top: 12px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #435a85;
      }
      input {
        width: 100%;
        border: 1px solid #cfe0ff;
        border-radius: 10px;
        padding: 10px;
        font-size: 14px;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
      }
      button,
      a {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        border-radius: 10px;
        padding: 9px 14px;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
      }
      .primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
      }
      .tip {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Mock 登录</h1>
      <p>这是本地联调用的登录页面。点击下方按钮后会将登录态标记为“已登录”。</p>

      <div class="field">
        <label for="user">账号（mock）</label>
        <input id="user" value="demo@kalodata.com" />
      </div>
      <div class="field">
        <label for="pass">密码（mock）</label>
        <input id="pass" type="password" value="123456" />
      </div>

      <div class="actions">
        <button id="loginBtn" class="primary" type="button">登录（Mock）</button>
        <a href="./index.html">返回首页</a>
      </div>
      <p class="tip">登录成功后自动跳回首页，可在顶部按钮看到“已登录”。</p>
    </main>

    <script>
      document.getElementById("loginBtn").addEventListener("click", () => {
        localStorage.setItem("kdc_login_state", "1");
        window.location.href = "./index.html";
      });
    </script>
  </body>
</html>
